<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Habitudes</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#EDEFE7">
<style>
  :root{
    --bg:#EDEFE7;
    --paper:#F7F8F3;
    --ink:#1E2A22;
    --ink-soft:#5B6459;
    --line:#D9DACB;
    --accent:#2F6B57;
    --accent-soft:#DCE8E1;
    --amber:#D98C2B;
    --amber-soft:#F3E2C8;
    --red:#B44A3C;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom:84px;
  }
  .wrap{max-width:520px;margin:0 auto;padding:0 16px;}
  header{
    padding:28px 16px 18px;
    max-width:520px;margin:0 auto;
  }
  .eyebrow{
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    font-size:12px;letter-spacing:.08em;color:var(--ink-soft);text-transform:uppercase;
  }
  h1{font-size:26px;margin:4px 0 2px;font-weight:600;letter-spacing:-0.01em;}
  .subdate{font-size:14px;color:var(--ink-soft);}

  .streakbar{
    display:flex;gap:10px;margin-top:16px;
  }
  .streak-pill{
    background:var(--paper);border:1px solid var(--line);border-radius:12px;
    padding:10px 14px;flex:1;
  }
  .streak-pill .num{font-size:20px;font-weight:600;font-family:ui-monospace,Menlo,monospace;}
  .streak-pill .lab{font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.06em;}

  nav.tabs{
    position:sticky;top:0;z-index:10;
    display:flex;gap:4px;background:var(--bg);
    padding:10px 16px;max-width:520px;margin:0 auto;
    border-bottom:1px solid var(--line);
  }
  nav.tabs button{
    flex:1;padding:9px 6px;border:none;background:transparent;
    font-size:13px;color:var(--ink-soft);border-radius:10px;cursor:pointer;
    font-weight:500;
  }
  nav.tabs button.active{background:var(--ink);color:var(--paper);}

  main{max-width:520px;margin:0 auto;padding:18px 16px 0;}
  section{display:none;}
  section.active{display:block;}

  .habit-row{
    background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;
  }
  .check{
    width:30px;height:30px;border-radius:9px;border:1.5px solid var(--line);
    flex:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
    background:var(--bg);transition:background .12s,border-color .12s;
  }
  .check.done{background:var(--accent);border-color:var(--accent);}
  .check.done::after{content:"";width:12px;height:7px;border-left:2.5px solid var(--paper);
    border-bottom:2.5px solid var(--paper);transform:rotate(-45deg) translate(1px,-1px);}
  .habit-main{flex:1;min-width:0;}
  .habit-name{font-size:15px;font-weight:500;}
  .dotstrip{display:flex;gap:4px;margin-top:6px;}
  .dot{width:9px;height:9px;border-radius:3px;background:var(--line);}
  .dot.on{background:var(--accent);}
  .dot.today{outline:1.5px solid var(--ink);outline-offset:1px;}

  .empty{
    text-align:center;color:var(--ink-soft);padding:40px 20px;font-size:14px;
  }

  /* Habitudes tab */
  .addbar{display:flex;gap:8px;margin-bottom:16px;}
  .addbar input{
    flex:1;border:1px solid var(--line);background:var(--paper);border-radius:10px;
    padding:11px 12px;font-size:15px;color:var(--ink);
  }
  .addbar input:focus{outline:none;border-color:var(--accent);}
  .addbar button{
    background:var(--ink);color:var(--paper);border:none;border-radius:10px;
    padding:0 18px;font-size:14px;font-weight:500;cursor:pointer;
  }
  .manage-row{
    background:var(--paper);border:1px solid var(--line);border-radius:12px;
    padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;
  }
  .manage-row .name{font-size:14px;font-weight:500;}
  .manage-row .meta{font-size:12px;color:var(--ink-soft);}
  .del{
    background:none;border:none;color:var(--red);font-size:13px;cursor:pointer;font-weight:500;
    padding:6px 4px;
  }

  /* Historique tab */
  .hist-controls{display:flex;gap:8px;align-items:center;margin-bottom:14px;}
  select{
    border:1px solid var(--line);background:var(--paper);border-radius:10px;
    padding:9px 10px;font-size:14px;color:var(--ink);flex:1;
  }
  .monthnav{display:flex;align-items:center;gap:10px;}
  .monthnav button{
    border:1px solid var(--line);background:var(--paper);border-radius:8px;
    width:32px;height:32px;font-size:15px;cursor:pointer;color:var(--ink);
  }
  .monthlabel{font-size:14px;font-weight:500;min-width:110px;text-align:center;font-family:ui-monospace,Menlo,monospace;}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:14px;}
  .cal .wd{font-size:10px;text-align:center;color:var(--ink-soft);text-transform:uppercase;}
  .cal .day{
    aspect-ratio:1;border-radius:8px;border:1px solid var(--line);background:var(--paper);
    display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;
    font-family:ui-monospace,Menlo,monospace;color:var(--ink-soft);
  }
  .cal .day.on{background:var(--accent);color:var(--paper);border-color:var(--accent);font-weight:600;}
  .cal .day.pad{visibility:hidden;cursor:default;}
  .cal .day.future{opacity:.35;cursor:default;}

  /* Stats tab */
  .periodrow{display:flex;gap:8px;margin-bottom:18px;}
  .periodrow button{
    flex:1;padding:9px;border-radius:10px;border:1px solid var(--line);background:var(--paper);
    font-size:13px;cursor:pointer;color:var(--ink-soft);font-weight:500;
  }
  .periodrow button.active{background:var(--accent);color:var(--paper);border-color:var(--accent);}
  .statrow{margin-bottom:16px;}
  .statrow .top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;}
  .statrow .top .n{font-weight:500;}
  .statrow .top .p{font-family:ui-monospace,Menlo,monospace;color:var(--ink-soft);}
  .barbg{height:8px;background:var(--line);border-radius:5px;overflow:hidden;}
  .barfg{height:100%;background:var(--accent);border-radius:5px;}

  footer.sync{
    max-width:520px;margin:24px auto 0;padding:14px 16px;
    font-size:12px;color:var(--ink-soft);text-align:center;
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow" id="todayLabel">--</div>
  <h1>Habitudes</h1>
  <div class="subdate">Coche ce que tu as fait aujourd'hui.</div>
  <div class="streakbar">
    <div class="streak-pill"><div class="num" id="statTodayDone">0/0</div><div class="lab">Aujourd'hui</div></div>
    <div class="streak-pill"><div class="num" id="statBestStreak">0</div><div class="lab">Meilleure série</div></div>
  </div>
</header>

<nav class="tabs">
  <button data-tab="today" class="active">Aujourd'hui</button>
  <button data-tab="history">Historique</button>
  <button data-tab="stats">Stats</button>
  <button data-tab="manage">Habitudes</button>
</nav>

<main>
  <section id="tab-today" class="active">
    <div id="todayList"></div>
  </section>

  <section id="tab-history">
    <div class="hist-controls">
      <select id="histHabitSelect"></select>
    </div>
    <div class="monthnav">
      <button id="prevMonth">‹</button>
      <div class="monthlabel" id="monthLabel">--</div>
      <button id="nextMonth">›</button>
    </div>
    <div class="cal" id="calGrid"></div>
  </section>

  <section id="tab-stats">
    <div class="periodrow">
      <button data-period="week" class="active">Cette semaine</button>
      <button data-period="month">Ce mois-ci</button>
    </div>
    <div id="statsList"></div>
  </section>

  <section id="tab-manage">
    <div class="addbar">
      <input id="newHabitInput" placeholder="ex : pompes au réveil" maxlength="60">
      <button id="addHabitBtn">Ajouter</button>
    </div>
    <div id="manageList"></div>
  </section>
</main>

<footer class="sync">
  Données stockées localement sur cet appareil. Synchronisation Google Drive à venir.
</footer>

<script>
/* ---------- Stockage ---------- */
const STORAGE_KEY = "habit-tracker-v1";

function loadData(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return { habits: [], entries: {} };
    return JSON.parse(raw);
  }catch(e){ return { habits: [], entries: {} }; }
}
function saveData(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
let state = loadData();

/* ---------- Utils dates ---------- */
function pad(n){ return n<10 ? "0"+n : ""+n; }
function fmt(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function todayStr(){ return fmt(new Date()); }
function key(habitId, dateStr){ return habitId + "|" + dateStr; }
function isDone(habitId, dateStr){ return !!state.entries[key(habitId,dateStr)]; }
function toggle(habitId, dateStr){
  const k = key(habitId,dateStr);
  if(state.entries[k]) delete state.entries[k];
  else state.entries[k] = true;
  saveData();
  renderAll();
}
const WEEKDAYS_FR = ["lun","mar","mer","jeu","ven","sam","dim"];
const MONTHS_FR = ["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];

/* ---------- Ajout / suppression d'habitudes ---------- */
function addHabit(name){
  name = name.trim();
  if(!name) return;
  state.habits.push({ id: "h_"+Date.now()+"_"+Math.random().toString(36).slice(2,7), name, createdAt: todayStr() });
  saveData();
  renderAll();
}
function removeHabit(id){
  state.habits = state.habits.filter(h => h.id !== id);
  Object.keys(state.entries).forEach(k => { if(k.startsWith(id+"|")) delete state.entries[k]; });
  saveData();
  renderAll();
}

/* ---------- Streak ---------- */
function currentStreak(habitId){
  let streak = 0;
  let d = new Date();
  while(true){
    const ds = fmt(d);
    if(isDone(habitId, ds)){ streak++; d.setDate(d.getDate()-1); }
    else if(ds === todayStr()){ d.setDate(d.getDate()-1); } // aujourd'hui pas encore fait, on continue de vérifier hier
    else break;
  }
  return streak;
}
function bestStreakAll(){
  let best = 0;
  state.habits.forEach(h => { best = Math.max(best, currentStreak(h.id)); });
  return best;
}

/* ---------- Rendu : Aujourd'hui ---------- */
function renderToday(){
  const list = document.getElementById("todayList");
  if(state.habits.length === 0){
    list.innerHTML = `<div class="empty">Aucune habitude pour l'instant.<br>Ajoute-en une dans l'onglet « Habitudes ».</div>`;
  } else {
    const t = todayStr();
    list.innerHTML = state.habits.map(h => {
      const done = isDone(h.id, t);
      const dots = [];
      for(let i=6;i>=0;i--){
        const d = new Date();
        d.setDate(d.getDate()-i);
        const ds = fmt(d);
        const on = isDone(h.id, ds);
        const isToday = ds === t;
        dots.push(`<div class="dot ${on?'on':''} ${isToday?'today':''}"></div>`);
      }
      return `
        <div class="habit-row">
          <div class="check ${done?'done':''}" data-habit="${h.id}" data-date="${t}"></div>
          <div class="habit-main">
            <div class="habit-name">${escapeHtml(h.name)}</div>
            <div class="dotstrip">${dots.join("")}</div>
          </div>
        </div>`;
    }).join("");
  }

  const doneCount = state.habits.filter(h => isDone(h.id, todayStr())).length;
  document.getElementById("statTodayDone").textContent = `${doneCount}/${state.habits.length}`;
  document.getElementById("statBestStreak").textContent = bestStreakAll();
}

function escapeHtml(s){
  return s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

/* ---------- Rendu : Habitudes (gestion) ---------- */
function renderManage(){
  const list = document.getElementById("manageList");
  if(state.habits.length === 0){
    list.innerHTML = `<div class="empty">Pas encore d'habitude enregistrée.</div>`;
    return;
  }
  list.innerHTML = state.habits.map(h => `
    <div class="manage-row">
      <div>
        <div class="name">${escapeHtml(h.name)}</div>
        <div class="meta">série actuelle : ${currentStreak(h.id)} jour(s)</div>
      </div>
      <button class="del" data-del="${h.id}">Supprimer</button>
    </div>
  `).join("");
}

/* ---------- Rendu : Historique ---------- */
let calMonth = new Date(); // mois affiché
function renderHistorySelect(){
  const sel = document.getElementById("histHabitSelect");
  const prev = sel.value;
  sel.innerHTML = state.habits.map(h => `<option value="${h.id}">${escapeHtml(h.name)}</option>`).join("");
  if(state.habits.some(h=>h.id===prev)) sel.value = prev;
}
function renderCalendar(){
  const sel = document.getElementById("histHabitSelect");
  const grid = document.getElementById("calGrid");
  document.getElementById("monthLabel").textContent = `${MONTHS_FR[calMonth.getMonth()]} ${calMonth.getFullYear()}`;

  if(state.habits.length === 0){
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1;">Ajoute une habitude pour voir son historique.</div>`;
    return;
  }
  const habitId = sel.value || state.habits[0].id;

  const year = calMonth.getFullYear(), month = calMonth.getMonth();
  const firstDay = new Date(year, month, 1);
  const startOffset = (firstDay.getDay() + 6) % 7; // lundi = 0
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const t = todayStr();

  let cells = WEEKDAYS_FR.map(w => `<div class="wd">${w}</div>`).join("");
  for(let i=0;i<startOffset;i++) cells += `<div class="day pad"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const dateObj = new Date(year, month, d);
    const ds = fmt(dateObj);
    const future = ds > t;
    const on = isDone(habitId, ds);
    cells += `<div class="day ${on?'on':''} ${future?'future':''}" ${future?'':`data-habit="${habitId}" data-date="${ds}"`}>${d}</div>`;
  }
  grid.innerHTML = cells;
}

/* ---------- Rendu : Stats ---------- */
let statPeriod = "week";
function periodDates(){
  const dates = [];
  const t = new Date();
  if(statPeriod === "week"){
    const dow = (t.getDay()+6)%7; // lundi=0
    const monday = new Date(t); monday.setDate(t.getDate()-dow);
    for(let i=0;i<7;i++){ const d = new Date(monday); d.setDate(monday.getDate()+i); if(d<=t) dates.push(fmt(d)); }
  } else {
    const first = new Date(t.getFullYear(), t.getMonth(), 1);
    for(let d = new Date(first); d<=t; d.setDate(d.getDate()+1)){ dates.push(fmt(d)); }
  }
  return dates;
}
function renderStats(){
  const list = document.getElementById("statsList");
  if(state.habits.length === 0){
    list.innerHTML = `<div class="empty">Rien à afficher pour l'instant.</div>`;
    return;
  }
  const dates = periodDates();
  list.innerHTML = state.habits.map(h => {
    const doneCount = dates.filter(ds => isDone(h.id, ds)).length;
    const pct = dates.length ? Math.round((doneCount/dates.length)*100) : 0;
    return `
      <div class="statrow">
        <div class="top"><span class="n">${escapeHtml(h.name)}</span><span class="p">${doneCount}/${dates.length} · ${pct}%</span></div>
        <div class="barbg"><div class="barfg" style="width:${pct}%"></div></div>
      </div>`;
  }).join("");
}

/* ---------- Rendu global ---------- */
function renderAll(){
  renderToday();
  renderManage();
  renderHistorySelect();
  renderCalendar();
  renderStats();
}

/* ---------- Événements ---------- */
document.getElementById("todayLabel").textContent = new Date().toLocaleDateString("fr-FR", { weekday:"long", day:"numeric", month:"long" });

document.querySelectorAll("nav.tabs button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("nav.tabs button").forEach(b=>b.classList.remove("active"));
    document.querySelectorAll("main section").forEach(s=>s.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("tab-"+btn.dataset.tab).classList.add("active");
  });
});

document.getElementById("addHabitBtn").addEventListener("click", () => {
  const input = document.getElementById("newHabitInput");
  addHabit(input.value);
  input.value = "";
});
document.getElementById("newHabitInput").addEventListener("keydown", e => {
  if(e.key === "Enter"){ addHabit(e.target.value); e.target.value=""; }
});

document.addEventListener("click", e => {
  const check = e.target.closest("[data-habit][data-date]");
  if(check){ toggle(check.dataset.habit, check.dataset.date); return; }
  const del = e.target.closest("[data-del]");
  if(del){ if(confirm("Supprimer cette habitude et tout son historique ?")) removeHabit(del.dataset.del); return; }
});

document.getElementById("histHabitSelect").addEventListener("change", renderCalendar);
document.getElementById("prevMonth").addEventListener("click", () => { calMonth.setMonth(calMonth.getMonth()-1); renderCalendar(); });
document.getElementById("nextMonth").addEventListener("click", () => { calMonth.setMonth(calMonth.getMonth()+1); renderCalendar(); });

document.querySelectorAll(".periodrow button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".periodrow button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    statPeriod = btn.dataset.period;
    renderStats();
  });
});

/* ---------- PWA : enregistrement du service worker ---------- */
if("serviceWorker" in navigator){
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  });
}

renderAll();
</script>
</body>
</html>
